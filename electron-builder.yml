appId: io.cttir.shinylaunchR
productName: shinylaunchR
copyright: Copyright © 2026 Raban Heller
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources
    to: resources
    filter:
      - "**/*"
  # Ship the project license + attribution in every artifact (Apache-2.0 §4a/§4d).
  - LICENSE
  - NOTICE
  - THIRD_PARTY_LICENSES.md
extraMetadata:
  main: out/main/main.js
# Publish target so `electron-builder --publish always` uploads to a GitHub Release.
publish:
  provider: github
  owner: cttir
  repo: shinylaunchR
asar: true
# Native modules (keytar) must be unpacked from the asar to load at runtime.
asarUnpack:
  - "**/node_modules/keytar/**"
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # Show the Apache-2.0 license during install.
  license: LICENSE
mac:
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip # enables auto-update later
      arch:
        - x64
        - arm64
  # Hardened runtime + entitlements: harmless unsigned, required when notarizing.
  # Ships UNSIGNED by default — set the signing secrets (see README) to sign.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
linux:
  icon: resources/icon.png
  category: Development
  maintainer: Raban Heller <raban.heller@outlook.com>
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
