# .github/workflows/pages.yml
#
# Publishes the shinylaunchR landing page to GitHub Pages at
# https://cttir.github.io/shinylaunchR/.
#
# shinylaunchR is an Electron app, not an R package, so unlike the rest of the
# CTTIR suite it has no pkgdown site. This workflow deploys the hand-built static
# page in site/ (styled with the themakR / Hugo Coder identity). The repo's Pages
# source is set to "GitHub Actions", so this artifact is what gets served.
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - site/**
      - resources/icon.png
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/. _site/
          cp resources/icon.png _site/icon.png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
